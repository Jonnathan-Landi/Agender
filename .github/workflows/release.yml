name: Publicar actualización

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Etiqueta existente que se publicará (por ejemplo, v1.8.1)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  release-windows:
    runs-on: windows-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
    steps:
      - name: Descargar el código
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: packaging/requirements-build.txt

      - name: Instalar dependencias del backend
        run: |
          python -m pip install -r backend/requirements-dev.txt
          python -m pip install -r packaging/requirements-build.txt

      - name: Auditar backend y ejecutar pruebas
        run: |
          python -m ruff check backend tests
          python -m unittest discover -s tests -v

      - name: Validar JavaScript
        shell: powershell
        run: |
          Get-ChildItem frontend -Recurse -Filter *.js |
            Where-Object { $_.FullName -notmatch 'vendor' } |
            ForEach-Object {
              node --check $_.FullName
              if ($LASTEXITCODE -ne 0) {
                throw "JavaScript inválido: $($_.FullName)"
              }
            }

      - name: Preparar Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cachear compilación Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Instalar Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Construir y validar la actualización sin publicarla
        shell: powershell
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: ./scripts/build-release.ps1 -ExpectedTag "$env:RELEASE_TAG"

      # La release permanece invisible para el updater mientras se cargan los archivos.
      - name: Crear borrador y cargar únicamente los artefactos validados
        shell: powershell
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$env:RELEASE_TAG" `
            release-artifacts/* `
            --draft `
            --verify-tag `
            --title "Agender $env:RELEASE_TAG" `
            --notes "Nueva versión de Agender. Consulta los cambios incluidos en esta actualización."

      - name: Comprobar la carga y publicar la actualización
        shell: powershell
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $assets = gh release view "$env:RELEASE_TAG" --json assets | ConvertFrom-Json
          $expected = @(Get-ChildItem release-artifacts -File).Name
          $uploaded = @($assets.assets.name)
          foreach ($name in $expected) {
            if ($name -notin $uploaded) {
              throw "El artefacto $name no llegó a GitHub; la release seguirá en borrador."
            }
          }
          gh release edit "$env:RELEASE_TAG" --draft=false
