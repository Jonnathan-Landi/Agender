version: 2
updates:
  - package-ecosystem: pip
    directory: /backend
    schedule:
      interval: weekly
    groups:
      backend-python-dependencies:
        patterns: ["*"]

  - package-ecosystem: pip
    directory: /packaging
    schedule:
      interval: weekly
    groups:
      packaging-python-dependencies:
        patterns: ["*"]

  - package-ecosystem: cargo
    directory: /src-tauri
    schedule:
      interval: weekly
    groups:
      rust-dependencies:
        patterns: ["*"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns: ["*"]
